version: 2

deploy:
  steps:
    terraformApply:
      after:
        - name: Print service URL
          run: |
            echo "================================"
            echo "ECS Fargate Deployment Complete"
            echo "================================"
            echo "App URL:         $(terraform output -raw alb_url)"
            echo "ECR Repo:        $(terraform output -raw ecr_repository_url)"
            echo "ECS Cluster:     $(terraform output -raw ecs_cluster_name)"
            echo "ECS Service:     $(terraform output -raw ecs_service_name)"
            echo "Logs:            $(terraform output -raw cloudwatch_log_group)"
            echo ""
            echo "Push a custom image:"
            ECR_URL=$(terraform output -raw ecr_repository_url)
            REGION="${AWS_DEFAULT_REGION:-us-east-1}"
            echo "  aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_URL"
            echo "  docker tag myapp:latest $ECR_URL:latest"
            echo "  docker push $ECR_URL:latest"

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Confirm destroy
          run: echo "Destroying ECS Fargate stack for $ENV0_ENVIRONMENT_NAME..."
