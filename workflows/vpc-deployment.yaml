name: VPC Deployment
description: Deploy VPC infrastructure as the foundation for all resources
version: "1.0"

steps:
  - name: Validate Terraform Configuration
    type: terraform
    action: validate
    working_directory: terraform

  - name: Plan VPC Infrastructure
    type: terraform
    action: plan
    working_directory: terraform
    variables:
      - environment
      - aws_region
    output_file: vpc-plan.tfplan

  - name: Review VPC Plan
    type: approval
    required: true
    description: "Review the VPC infrastructure plan before applying"

  - name: Deploy VPC
    type: terraform
    action: apply
    working_directory: terraform
    plan_file: vpc-plan.tfplan
    auto_approve: false

outputs:
  vpc_id:
    description: "VPC ID for downstream resources"
    value: "module.vpc.vpc_id"
  subnet_id:
    description: "Public subnet ID for EC2 instances"
    value: "module.vpc.public_subnet_id"

triggers:
  - event: manual
  - event: schedule
    cron: "0 2 * * 0"  # Weekly deployment window
