name: Destroy Environment
description: Safely tear down entire infrastructure stack with dependency management
version: "1.0"

parameters:
  environment:
    type: string
    description: "Environment to destroy (dev, staging, prod)"

  require_approval:
    type: boolean
    default: true
    description: "Require approval before destroying resources"

safety_checks:
  - name: Prevent Production Destruction
    condition: "parameters.environment != 'prod'"
    message: "Production environments can only be destroyed with explicit approval"

  - name: Confirmation
    type: approval
    required: ${{ parameters.require_approval }}
    message: "This will destroy all infrastructure in ${{ parameters.environment }}. Please confirm."

stages:
  - name: Destroy Compute
    description: "Destroy EC2 instances and IAM roles first"
    steps:
      - name: Destroy EC2 and IAM
        type: terraform
        action: destroy
        working_directory: terraform
        targets:
          - module.ec2
          - module.iam
        auto_approve: false

  - name: Destroy Storage
    description: "Destroy S3 buckets"
    depends_on: [Destroy Compute]
    steps:
      - name: Destroy S3
        type: terraform
        action: destroy
        working_directory: terraform
        targets:
          - module.s3
        auto_approve: false

  - name: Destroy Foundation
    description: "Destroy VPC and security groups"
    depends_on: [Destroy Storage]
    steps:
      - name: Destroy VPC and Security Groups
        type: terraform
        action: destroy
        working_directory: terraform
        targets:
          - module.vpc
          - module.security_groups
        auto_approve: false

notifications:
  - type: email
    on: [completion]
  - type: slack
    on: [completion]
    channel: "#operations"
