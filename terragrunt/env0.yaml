version: 2

deploy:
  steps:
    terraformInit:
      after:
        - name: Verify modules
          run: |
            echo "Deploying Terragrunt stack: $ENV0_PROJECT_NAME"
            echo "Environment: $ENV0_ENVIRONMENT_NAME"
            echo "Region: us-east-2"

    terraformApply:
      before:
        - name: Apply in dependency order with real outputs
          run: |
            terragrunt run-all apply -auto-approve --terragrunt-non-interactive
        - name: Regenerate plan files to reflect applied state
          run: |
            terragrunt run-all plan -out=.tf-plan --terragrunt-non-interactive

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Pre-destroy notice
          run: echo "Destroying all modules in dependency order..."
