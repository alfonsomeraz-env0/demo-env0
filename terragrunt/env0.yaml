version: 2

deploy:
  steps:
    terraformInit:
      after:
        - name: Verify modules
          run: |
            echo "Deploying Terragrunt stack: $ENV0_PROJECT_NAME"
            echo "Environment: $ENV0_ENVIRONMENT_NAME"
            echo "Region: us-east-2"

    terraformApply:
      override:
        - name: Apply all modules in dependency order
          run: |
            terragrunt run-all apply -auto-approve --terragrunt-non-interactive

destroy:
  steps:
    terraformDestroy:
      override:
        - name: Destroy EC2 first to release public IPs and subnet dependencies
          run: |
            terragrunt destroy -auto-approve --terragrunt-non-interactive --terragrunt-working-dir ec2
        - name: Destroy remaining modules in reverse dependency order
          run: |
            terragrunt run-all destroy -auto-approve --terragrunt-non-interactive --terragrunt-exclude-dir ec2
