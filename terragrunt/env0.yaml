version: 2

deploy:
  steps:
    terraformInit:
      after:
        - name: Verify modules
          run: |
            echo "Deploying Terragrunt stack: $ENV0_PROJECT_NAME"
            echo "Environment: $ENV0_ENVIRONMENT_NAME"
            echo "Region: us-east-2"

    terraformPlan:
      - name: Terragrunt Plan
        run: terragrunt run-all plan --terragrunt-non-interactive

    terraformApply:
      - name: Terragrunt Apply
        run: terragrunt run-all apply -auto-approve --terragrunt-non-interactive

destroy:
  steps:
    terraformDestroy:
      - name: Terragrunt Destroy
        run: terragrunt run-all destroy -auto-approve --terragrunt-non-interactive
