version: 2

deploy:
  steps:
    terraformInit:
      after:
        - name: Verify modules
          run: |
            echo "Deploying Terragrunt stack: $ENV0_PROJECT_NAME"
            echo "Environment: $ENV0_ENVIRONMENT_NAME"
            echo "Region: us-east-2"

    terraformApply:
      before:
        - name: Remove stale plan files
          run: |
            find . -name ".tf-plan" -delete
            echo "Plan files removed — modules will re-plan with real dependency outputs"

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Pre-destroy notice
          run: echo "Destroying all modules in dependency order..."
