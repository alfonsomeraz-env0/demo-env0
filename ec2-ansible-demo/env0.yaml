version: 2

deploy:
  steps:
    terraformInit:
      before:
        - name: Install Ansible and dependencies
          run: |
            pip3 install ansible boto3 botocore
            ansible-galaxy collection install -r requirements.yml

        - name: Install AWS Session Manager plugin
          run: |
            curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin" \
              -o /usr/local/bin/session-manager-plugin
            chmod +x /usr/local/bin/session-manager-plugin
            session-manager-plugin --version

    terraformApply:
      after:
        - name: Wait for SSM registration
          run: |
            EXPECTED=$((${TF_VAR_web_count:-1} + ${TF_VAR_app_count:-2}))
            echo "Waiting for $EXPECTED instances to register with SSM..."

            for i in $(seq 1 40); do
              REGISTERED=$(aws ssm describe-instance-information \
                --filters "Key=tag:Project,Values=env0-ansible-demo" \
                --query "length(InstanceInformationList)" \
                --output text --region ${TF_VAR_aws_region:-us-east-2})
              echo "  Registered: $REGISTERED / $EXPECTED"
              if [ "$REGISTERED" -ge "$EXPECTED" ]; then
                echo "  ✅ All instances registered"
                break
              fi
              sleep 15
            done

        - name: Run Ansible playbook
          run: |
            SSM_BUCKET=$(terraform output -raw ssm_bucket_name)
            ansible-playbook -i inventory/aws_ec2.yml site.yml \
              --extra-vars "env_name=${ENV0_ENVIRONMENT_NAME:-dev} ansible_aws_ssm_bucket_name=$SSM_BUCKET" -v

        - name: Verify deployment
          run: |
            WEB_URL=$(terraform output -raw web_url)
            echo "=========================================="
            echo "Deployment Complete!"
            echo "Web URL: $WEB_URL"
            echo "=========================================="
            sleep 5
            curl -sf "$WEB_URL/health" && echo "Health check passed" || echo "Health check pending"
            curl -s "$WEB_URL" | head -5 || true

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Cleanup message
          run: echo "Destroying infrastructure..."
