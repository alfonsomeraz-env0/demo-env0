version: 2

deploy:
  steps:
    terraformInit:
      before:
        - name: Setup SSH Key
          run: |
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" | tr ';' '\n' | tr -d "\r" > ~/.ssh/private_key.pem
            chmod 600 ~/.ssh/private_key.pem
            echo "SSH key created with permissions:"
            ls -la ~/.ssh/private_key.pem
            echo "First line of key:"
            head -1 ~/.ssh/private_key.pem
            echo "Last line of key:"
            tail -1 ~/.ssh/private_key.pem
        
        - name: Install Ansible
          run: |
            if ! command -v ansible &> /dev/null; then
              echo "Installing Ansible..."
              pip3 install ansible
            fi
    
    terraformApply:
      after:
        - name: Wait for Instance
          run: |
            echo "Waiting for EC2 instance to be ready..."
            sleep 60
        
        - name: Get EC2 IP
          run: |
            EC2_IP=$(terraform output -raw instance_public_ip)
            echo "EC2 Instance IP: $EC2_IP"
            echo "$EC2_IP" > instance_ip.txt
        
        - name: Wait for SSH
          run: |
            export ANSIBLE_HOST_KEY_CHECKING=False
            EC2_IP=$(cat instance_ip.txt)
            echo "Waiting for SSH on $EC2_IP..."
            
            for i in {1..40}; do
              echo "Attempt $i/40..."
              if ssh -o StrictHostKeyChecking=no \
                     -o ConnectTimeout=10 \
                     -o BatchMode=yes \
                     -i ~/.ssh/private_key.pem \
                     ubuntu@$EC2_IP "echo 'SSH Ready'" 2>/dev/null; then
                echo "✅ SSH is ready!"
                sleep 10
                break
              fi
              echo "SSH not ready yet, waiting 10 seconds..."
              sleep 10
            done
        
        - name: Run Ansible Playbook
          run: |
            export ANSIBLE_HOST_KEY_CHECKING=False
            EC2_IP=$(cat instance_ip.txt)
            echo "Running Ansible playbook against $EC2_IP..."
            ansible-playbook -i "${EC2_IP}," \
              -u ubuntu \
              --private-key=~/.ssh/private_key.pem \
              playbook.yml
        
        - name: Display Results
          run: |
            EC2_IP=$(cat instance_ip.txt)
            echo "=========================================="
            echo "🎉 Deployment Complete!"
            echo "=========================================="
            echo "Instance IP: $EC2_IP"
            echo "Web Server: http://$EC2_IP"
            echo "=========================================="
            sleep 10
            curl -s http://$EC2_IP || echo "Web server starting up..."

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Cleanup Message
          run: echo "Destroying infrastructure..."
