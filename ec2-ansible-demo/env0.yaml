version: 2

deploy:
  steps:
    terraformInit:
      before:
        - name: Install Ansible and dependencies
          run: |
            pip3 install ansible boto3 botocore
            ansible-galaxy collection install -r requirements.yml

    terraformApply:
      after:
        - name: Retrieve SSH key from SSM Parameter Store
          run: |
            mkdir -p ~/.ssh
            aws ssm get-parameter \
              --name "/env0-ansible-demo/private-key" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text \
              --region ${TF_VAR_aws_region:-us-east-2} \
              > ~/.ssh/private_key.pem
            chmod 600 ~/.ssh/private_key.pem
            echo "SSH key retrieved"

        - name: Wait for instances to initialize
          run: |
            echo "Waiting for EC2 instances to initialize..."
            sleep 60

        - name: Wait for SSH on all instances
          run: |
            WEB_IPS=$(terraform output -json web_instance_ips | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
            APP_IPS=$(terraform output -json app_instance_ips | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
            ALL_IPS="$WEB_IPS $APP_IPS"

            for IP in $ALL_IPS; do
              echo "Waiting for SSH on $IP..."
              for i in $(seq 1 40); do
                if ssh -o StrictHostKeyChecking=no \
                       -o ConnectTimeout=10 \
                       -o BatchMode=yes \
                       -i ~/.ssh/private_key.pem \
                       ubuntu@$IP "echo ready" 2>/dev/null; then
                  echo "  ✅ $IP is ready"
                  break
                fi
                echo "  Attempt $i/40, retrying in 10s..."
                sleep 10
              done
            done

        - name: Run Ansible playbook
          run: |
            ansible-playbook -i inventory/aws_ec2.yml site.yml \
              --extra-vars "env_name=${ENV0_ENVIRONMENT_NAME:-dev}" -v

        - name: Verify deployment
          run: |
            WEB_URL=$(terraform output -raw web_url)
            echo "=========================================="
            echo "Deployment Complete!"
            echo "Web URL: $WEB_URL"
            echo "=========================================="
            sleep 5
            curl -sf "$WEB_URL/health" && echo "Health check passed" || echo "Health check pending"
            curl -s "$WEB_URL" | head -5 || true

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Cleanup message
          run: echo "Destroying infrastructure..."
