---
- name: Configure EC2 Instance with Web Server
  hosts: all
  become: yes
  gather_facts: no
  vars:
    ansible_python_interpreter: auto_silent
  
  tasks:
    - name: Wait a moment for system to be ready
      pause:
        seconds: 10
    
    - name: Test raw connection
      raw: echo "Connection successful"
      changed_when: false
    
    - name: Ensure Python 3 is installed
      raw: |
        apt-get update -qq
        apt-get install -y python3 python3-apt
      changed_when: false
    
    - name: Update package cache (Ubuntu)
      apt:
        update_cache: yes

    - name: Install Apache web server (Ubuntu)
      apt:
        name: apache2
        state: present

    - name: Start and enable Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom index.html
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>env0 Demo Success</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
              }
              .container {
                text-align: center;
                background: rgba(255,255,255,0.1);
                padding: 50px;
                border-radius: 20px;
                backdrop-filter: blur(10px);
              }
              h1 { font-size: 3em; margin: 0; }
              p { font-size: 1.2em; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎉 Success!</h1>
              <p>This EC2 instance was provisioned by <strong>env0</strong></p>
              <p>and configured with <strong>Ansible</strong>!</p>
              <p>Hostname: {{ inventory_hostname }}</p>
            </div>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Ensure Apache is configured correctly
      lineinfile:
        path: /etc/apache2/apache2.conf
        regexp: '^ServerName'
        line: 'ServerName localhost'
      notify: restart apache2

  handlers:
    - name: restart apache2
      service:
        name: apache2
        state: restarted
