---
- name: Configure EC2 Instance with Web Server
  hosts: all
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update package cache
      yum:
        update_cache: yes
      when: ansible_os_family == "RedHat"

    - name: Install Apache web server
      yum:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Create custom index.html
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>env0 Demo Success</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
              }
              .container {
                text-align: center;
                background: rgba(255,255,255,0.1);
                padding: 50px;
                border-radius: 20px;
                backdrop-filter: blur(10px);
              }
              h1 { font-size: 3em; margin: 0; }
              p { font-size: 1.2em; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎉 Success!</h1>
              <p>This EC2 instance was provisioned by <strong>env0</strong></p>
              <p>and configured with <strong>Ansible</strong>!</p>
              <hr style="border: 1px solid white; width: 50%;">
              <p><strong>Hostname:</strong> {{ ansible_hostname }}</p>
              <p><strong>IP Address:</strong> {{ ansible_default_ipv4.address }}</p>
            </div>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Ensure firewall allows HTTP
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_os_family == "RedHat"
      ignore_errors: yes
