---
- name: Configure EC2 Instance with Web Server
  hosts: all
  become: yes
  gather_facts: no
  
  tasks:
    - name: Install and configure Apache in one step
      raw: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq && apt-get install -y apache2
        systemctl start apache2
        systemctl enable apache2
        cat > /var/www/html/index.html <<'EOF'
        <!DOCTYPE html>
        <html>
        <head>
          <title>env0 Demo Success</title>
          <style>
            body {
              font-family: Arial, sans-serif;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              margin: 0;
            }
            .container {
              text-align: center;
              background: rgba(255,255,255,0.1);
              padding: 50px;
              border-radius: 20px;
            }
            h1 { font-size: 3em; margin: 0; }
            p { font-size: 1.2em; }
          </style>
        </head>
        <body>
          <div class="container">
            <h1>🎉 Success!</h1>
            <p>EC2 provisioned by <strong>env0</strong></p>
            <p>Configured with <strong>Ansible</strong></p>
          </div>
        </body>
        </html>
        EOF
      changed_when: false
