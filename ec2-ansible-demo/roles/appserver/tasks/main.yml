---
- name: Install Flask
  pip:
    name: flask
    executable: pip3

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  loop:
    - /opt/env0-app
    - /opt/env0-app/static

- name: Deploy Flask app
  copy:
    src: app.py
    dest: /opt/env0-app/app.py
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  notify: Restart app

- name: Deploy landing page
  copy:
    src: index.html
    dest: /opt/env0-app/static/index.html
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  notify: Restart app

- name: Install systemd service
  template:
    src: app.service.j2
    dest: /etc/systemd/system/env0-app.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart app

- name: Start and enable app service
  service:
    name: env0-app
    state: started
    enabled: yes
