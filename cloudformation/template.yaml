AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 bucket deployment demo for env0

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket
    Default: env0-cloudformation-demo

  Environment:
    Type: String
    Description: Deployment environment
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  DemoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketName}-${Environment}"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: env0

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref DemoBucket

  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt DemoBucket.Arn
